- layout: top-middle
  name: 8팀 리스크 자동 추적 시스템
  link: https://min-omniai.github.io/ops-risk-dashboard/
  quote: >
    구두 브리핑 하루 80~120분을 자동 파이프라인으로 대체 — 설계는 사람, 구현은 AI
  description: | # this will include new lines to allow paragraphs
    * **문제** — 8팀 구두 브리핑(팀당 10~15분)만으로는 병목을 조기에 못 잡고, 운영진 간 판단 기준도 제각각
    * **설계** — GSheet 데이터 스키마 역할 분리(작업현황/리스크/피드백/GPT 구조화 판단) + 자동 병목 판정 규칙(지연율 50% 초과, 작업량 편중, D-Day 경과, 연속 3일 미제출) 명문화
    * **구현** — Claude Code · Codex에 지시해 React + TypeScript + Supabase 웹 대시보드 구현, Google Apps Script로 GSheet ↔ Supabase 자동 동기화
    * GPT 판단 값은 등급 4종 · 위험유형 7종으로 허용값을 고정해 자유 서술로 인한 구조화 붕괴 방지
    * [라이브 데모](https://min-omniai.github.io/ops-risk-dashboard/) · [저장소](https://github.com/min-omniai/ops-risk-dashboard)

