- layout: top-middle
  name: 1인 운영 자동화 + 검증 설계
  quote: >
    "생성은 AI, 검증은 결정론적 코드" — 57명 규모를 1인이 감당한 신뢰성 설계
  description: | # this will include new lines to allow paragraphs
    * **문제** — 57명 코호트의 반복 산술(경보 판단 · 출결 집계)을 손으로 하면 수치 드리프트 누적
    * **설계** — 판단 원칙을 규칙 문서로 성문화한 뒤, 코드로 강제하는 장치를 계층화
    * `recompute_alerts.py` — LLM이 하던 산술을 결정론적 코드로 재계산해 정합성을 대조하는 read-only 검증기
    * 훅 6종 — 아카이브 보호 · 프로필 덮어쓰기 방지 · 이탈 키워드 감지 · 경보 등급 검증 등
    * GitHub Actions 5개 — 일일/주간 회고 자동 생성, 팀 데일리 · 위클리 체크인 자동화 (Google Sheets 서비스계정 연동)
    * 429개 커밋(3개월) 구축·운영, 7주간 팀 체크인 기록 자동 산출 확인

