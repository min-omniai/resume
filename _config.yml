    content:
      - layout: left
        border: weak
        title: 8팀 리스크 자동 추적 시스템
        link: https://min-omniai.github.io/ops-risk-dashboard/
        link_text: 라이브 데모
        additional_links:
          - title: min-omniai/ops-risk-dashboard
            icon: fab fa-github
            url: https://github.com/min-omniai/ops-risk-dashboard
        quote: >
          하루 80~120분 걸리던 구두 브리핑을 자동 파이프라인으로 대체
        description: | # this will include new lines to allow paragraphs
          8개 팀의 일일 진행 상황을 GSheet 스키마(작업현황·리스크·피드백·GPT 구조화 판단)로
          역할 분리하고, 지연율·작업량 편중·D-Day 경과·연속 미제출을 자동 판정하는 규칙을 설계했습니다.
          이 설계를 Claude Code·Codex에 지시해 React·TypeScript·Supabase 웹 대시보드로 구현하고,
          Google Apps Script로 시트와 자동 동기화했습니다.
          GPT 판단 값은 등급 4종·위험유형 7종으로 허용값을 고정해 구조화가 무너지지 않게 했습니다.

      - layout: left
        border: weak
        title: 1인 운영 자동화·검증 시스템
        quote: >
          생성은 AI, 검증은 결정론적 코드
        description: | # this will include new lines to allow paragraphs
          57명 코호트의 경보 판단·출결 집계 같은 반복 산술을 LLM에 맡기면 수치가 조금씩 어긋납니다.
          판단 원칙을 규칙 문서로 성문화한 뒤, 결정론적 검증 스크립트와 훅 6종(데이터 덮어쓰기 방지·
          이탈 키워드 감지 등), GitHub Actions 5개(회고·팀 체크인 자동화)로 규칙을 코드로 강제했습니다.
          3개월간 429커밋으로 구축·운영했습니다.

      - layout: left
        title: 게임 제품 생애주기 운영
        quote: >
          컨셉 → Demo → CBT → OBT → 최종발표, 실제 출시 프로세스로
        description: | # this will include new lines to allow paragraphs
          8개 캡스톤 팀을 3개 B2B 파트너사와 조율하며 실제 게임 출시 게이트로 운영했습니다.
          8팀 전원이 최종발표까지 완주했고, Google Play Console 테스트 빌드 배포까지 진행했습니다.

