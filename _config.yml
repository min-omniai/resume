about_content: | # this will include new lines to allow paragraphs
  Unity 게임 클라이언트 개발 4년을 거쳐, 지금은 AI로 운영을 자동화하는 시스템을 만듭니다.

  57명 학습자·8개 팀 규모의 개발자 교육 과정을 혼자 운영하기 위해 슬래시 커맨드 23개, 훅 6개,
  GitHub Actions 5개, 리스크 추적 웹 대시보드를 설계·구축했습니다.
  문제 정의와 데이터 스키마·판단 규칙 설계, 검증은 직접 하고 구현은 AI에 지시합니다.

  원칙은 하나입니다 — <mark>AI는 초안을 만들고, 최종 검증은 사람이 한다.</mark>

